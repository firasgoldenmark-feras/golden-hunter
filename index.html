// SIGNATURE PAD
// ══════════════════════════════════════════════════
function SignaturePad({ onSave, onCancel }) {
  const canvasRef = useRef(null);
  const drawing = useRef(false);
  const lastPos = useRef(null);

  const getPos = (e, canvas) => {
    const rect = canvas.getBoundingClientRect();
    const touch = e.touches ? e.touches[0] : e;
    return { x:(touch.clientX-rect.left)*(canvas.width/rect.width), y:(touch.clientY-rect.top)*(canvas.height/rect.height) };
  };

  const initCanvas = () => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    ctx.fillStyle = "#1a1e2e";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = "#252840";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(20, canvas.height-40);
    ctx.lineTo(canvas.width-20, canvas.height-40);
    ctx.stroke();
  };

  useEffect(() => { initCanvas(); }, []);

  const start = e => { e.preventDefault(); drawing.current=true; lastPos.current=getPos(e, canvasRef.current); };
  const move = e => {
    e.preventDefault();
    if (!drawing.current) return;
    const canvas = canvasRef.current, ctx = canvas.getContext("2d");
    const pos = getPos(e, canvas);
    ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y);
    ctx.lineTo(pos.x, pos.y); ctx.strokeStyle="#D4AF37"; ctx.lineWidth=2.5; ctx.lineCap="round"; ctx.stroke();
    lastPos.current = pos;
  };
  const end = e => { e.preventDefault(); drawing.current = false; };
  const clear = () => initCanvas();

  return (
    <div>
      <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:8, textAlign:"center" }}>وقّع بإصبعك في المنطقة أدناه</p>
      <canvas ref={canvasRef} width={320} height={160}
        style={{ width:"100%", borderRadius:12, border:`2px solid ${T.gold}44`, display:"block" }}
        onMouseDown={start} onMouseMove={move} onMouseUp={end}
        onTouchStart={start} onTouchMove={move} onTouchEnd={end}/>
      <div style={{ display:"flex", gap:8, marginTop:12 }}>
        <Btn label="مسح" onClick={clear} outline color={T.sub} sm/>
        <Btn label="إلغاء" onClick={onCancel} outline color={T.red} sm/>
        <div style={{flex:1}}><Btn label="✓ حفظ التوقيع" onClick={()=>onSave(canvasRef.current.toDataURL())} full color={T.gold} sm/></div>
      </div>
    </div>
  );
}

// VEHICLE IMPORTER
// ══════════════════════════════════════════════════
function VehicleImporter({ vehicles, saveVehicles, saveOneVehicle, deleteVehicle }) {
  const [step, setStep] = useState("idle");
  const [rawRows, setRawRows] = useState([]);
  const [headers, setHeaders] = useState([]);
  const [mapping, setMapping] = useState({});
  const [preview, setPreview] = useState([]);
  const [loading, setLoading] = useState(false);
  const [msg, setMsg] = useState("");
  const [editVeh, setEditVeh] = useState(null);
  const [showList, setShowList] = useState(false);
  const [editForm, setEditForm] = useState({});

  const FIELDS = [
    { key:"plate", label:"رقم اللوحة", required:true },
    { key:"regNum", label:"رقم التسجيل" },
    { key:"type", label:"نوع المركبة" },
    { key:"make", label:"الصنع/الماركة" },
  ];

  const readFile = async file => {
    setLoading(true); setMsg("جارٍ قراءة الملف...");
    try {
      const buf = await file.arrayBuffer();
      const wb = XLSX.read(buf, { type:"array" });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const data = XLSX.utils.sheet_to_json(ws, { header:1, defval:"" });
      if (!data.length) { setMsg("❌ الملف فارغ"); setLoading(false); return; }
      const hdrs = data[0].map(h => String(h).trim());
      const rows = data.slice(1).filter(r => r.some(c => c !== ""));
      setHeaders(hdrs); setRawRows(rows);
      // Auto detect
      const map = {};
      const lower = hdrs.map(h => String(h).toLowerCase().trim());
      const match = kws => { const i = lower.findIndex(h => kws.some(k => h.includes(k))); return i>=0 ? hdrs[i] : null; };
      map.plate = match(["لوحة","plate","رقم المركب","رقم السيار","vehicle"]);
      map.regNum = match(["تسجيل","registration","reg","chassis","هيكل"]);
      map.type = match(["نوع","type","موديل","model","فئة"]);
      map.make = match(["صنع","ماركة","make","brand","manufacturer","شركة"]);
      setMapping(map);
      setStep("mapping");
      setMsg(map.plate ? "✅ تم التعرف على الأعمدة" : "⚠️ حدد عمود اللوحة يدوياً");
    } catch { setMsg("❌ تعذّر قراءة الملف"); }
    setLoading(false);
  };

  const buildPreview = () => {
    if (!mapping.plate) { setMsg("❌ يجب تحديد عمود رقم اللوحة"); return; }
    const pI=headers.indexOf(mapping.plate), rI=mapping.regNum?headers.indexOf(mapping.regNum):-1;
    const tI=mapping.type?headers.indexOf(mapping.type):-1, mI=mapping.make?headers.indexOf(mapping.make):-1;
    const rows = rawRows.map(r => ({
      id:uid(), plate:String(r[pI]||"").trim(), regNum:rI>=0?String(r[rI]||"").trim():"",
      type:tI>=0?String(r[tI]||"").trim():"", make:mI>=0?String(r[mI]||"").trim():"",
      license_exp:"", insurance_exp:"", renewHistory:[]
    })).filter(r => r.plate);
    setPreview(rows); setStep("preview"); setMsg("");
  };

  const confirmImport = () => {
    const existing = vehicles.filter(v => !preview.some(p => p.plate===v.plate));
    saveVehicles([...existing, ...preview]);
    setStep("done"); setMsg(`✅ تم استيراد ${preview.length} مركبة`);
    setTimeout(() => { setStep("idle"); setMsg(""); }, 3000);
  };

  return (
    <div>
      {/* Vehicle List */}
      <div style={{ background:T.card2, borderRadius:12, marginBottom:14, overflow:"hidden" }}>
        <button onClick={()=>setShowList(!showList)} style={{ width:"100%", background:"none", border:"none", padding:"14px 16px", display:"flex", justifyContent:"space-between", cursor:"pointer" }}>
          <span style={{ color:T.text, ...GF, fontSize:14 }}>🚗 المركبات المحفوظة ({vehicles.length})</span>
          <span style={{ color:T.sub }}>{showList?"▲":"▼"}</span>
        </button>
        {showList && (
          <div style={{ borderTop:`1px solid ${T.border}`, padding:"10px 14px" }}>
            {!vehicles.length
              ? <div style={{ color:T.sub, ...GF, fontSize:13, textAlign:"center", padding:16 }}>لا توجد مركبات بعد</div>
              : vehicles.map(v => (
                <div key={v.id} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card, borderRadius:10, padding:"10px 12px", marginBottom:8 }}>
                  <div>
                    <div style={{ color:T.gold, ...GF, fontWeight:700, fontSize:14 }}>{v.plate}</div>
                    <div style={{ color:T.sub, ...GF, fontSize:11, marginTop:2 }}>{[v.type,v.make,v.regNum].filter(Boolean).join(" | ")||"—"}</div>
                  </div>
                  <div style={{ display:"flex", gap:6 }}>
                    <button onClick={()=>{ setEditVeh(v.id); setEditForm({plate:v.plate,regNum:v.regNum||"",type:v.type||"",make:v.make||"",license_exp:v.license_exp||"",insurance_exp:v.insurance_exp||"",fuelType:v.fuelType||""}); }}
                      style={{ background:T.blue+"22", border:"none", color:T.blue, borderRadius:8, padding:"5px 12px", cursor:"pointer", ...GF, fontSize:12 }}>تعديل</button>
                    <button onClick={async()=>{ await deleteVehicle(v.id); }}
                      style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:8, padding:"5px 12px", cursor:"pointer", ...GF, fontSize:12 }}>حذف</button>
                  </div>
                </div>
              ))
            }
          </div>
        )}
      </div>

      {/* Import */}
      {step==="idle" && (
        <div>
          <label style={{ display:"block", background:T.card2, borderRadius:14, padding:"22px 16px", textAlign:"center", cursor:"pointer", border:`2px dashed ${T.gold}44` }}>
            <input type="file" accept=".xlsx,.xls,.csv" onChange={e=>{ if(e.target.files[0]) readFile(e.target.files[0]); }} style={{ display:"none" }}/>
            <div style={{ fontSize:36, marginBottom:8 }}>📂</div>
            <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700 }}>رفع ملف Excel</div>
            <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:6 }}>xlsx / xls / csv — يتعرف تلقائياً على الأعمدة</div>
          </label>
          {msg && <div style={{ marginTop:10, color:T.red, ...GF, fontSize:13, textAlign:"center" }}>{msg}</div>}

// NOTIFICATIONS
// ══════════════════════════════════════════════════
function buildNotifications(violations, vehicles, maintenanceRecs, fuelRecords) {
  const notes = [];

  violations.filter(v => v.status !== "مسددة").forEach(v => {
    const r = 30 - daysDiff(v.vdate);
    if (r<=0) notes.push({ id:"viol-"+v.id, icon:"⛔", title:"مخالفة — انتهت المهلة", body:`${v.plate} — ${v.vtype}`, color:T.red, tab:"violations", priority:true });
    else if (r<=5) notes.push({ id:"viol-"+v.id, icon:"🔴", title:`مخالفة — ${r} أيام متبقية`, body:`${v.plate} — ${v.vtype}`, color:T.red, tab:"violations", priority:true });
    else if (r<=10) notes.push({ id:"viol-"+v.id, icon:"🟠", title:`مخالفة — ${r} يوم متبقي`, body:`${v.plate}`, color:T.orange, tab:"violations" });
  });

  vehicles.forEach(v => {
    const chk = (exp, label) => {
      if (!exp) return;
      const diff = daysDiff(new Date(), exp);
      if (diff>=0) notes.push({ id:"lic-"+v.id+label, icon:"🔴", title:`${label} منتهي`, body:v.plate, color:T.red, tab:"license", priority:true });
      else { const r=Math.abs(diff);
        if (r<=3) notes.push({ id:"lic-"+v.id+label, icon:"🔴", title:`${label} — ${r} أيام`, body:v.plate, color:T.red, tab:"license", priority:true });
        else if (r<=7) notes.push({ id:"lic-"+v.id+label, icon:"🟠", title:`${label} — ${r} أيام`, body:v.plate, color:T.orange, tab:"license" });
        else if (r<=14) notes.push({ id:"lic-"+v.id+label, icon:"🟡", title:`${label} — ${r} يوم`, body:v.plate, color:T.yellow, tab:"license" });
      }
    };
    if (v.license_exp) chk(v.license_exp, "الترخيص");
    if (v.insurance_exp) chk(v.insurance_exp, "التأمين");
  });

  vehicles.forEach(v => {
    const fRecs = fuelRecords.filter(r=>r.vehicleId===v.id).sort((a,b)=>b.currKm-a.currKm);
    const currKm = fRecs.length ? fRecs[0].currKm : null;
    const mRecs = maintenanceRecs.filter(r=>r.vehicleId===v.id).sort((a,b)=>a.oilKm-b.oilKm);
    if (!mRecs.length) return;
    const last = mRecs[mRecs.length-1];
    const nextOil = last.nextOilKm || (last.oilKm+5000);
    if (currKm) {
      const diff = nextOil - currKm;
      if (diff<=0) notes.push({ id:"maint-"+v.id, icon:"🔴", title:"غيار زيت متأخر", body:`${v.plate} — تجاوز ${Math.abs(diff).toLocaleString()} كلم`, color:T.red, tab:"maintenance", priority:true });
      else if (diff<=500) notes.push({ id:"maint-"+v.id, icon:"🟠", title:"غيار زيت قريب", body:`${v.plate} — ${diff.toLocaleString()} كلم`, color:T.orange, tab:"maintenance" });
    }
  });

  return notes;
}

  if (!notes.length) return (
    <div style={{ padding:"32px 20px", textAlign:"center" }}>

}

function MyVehiclesTab({ vehicles, violations, maintenanceRecs, fuelRecords, handovers, onBack }) {
  const [selVeh, setSelVeh] = useState("");
  const veh = vehicles.find(v => v.id===selVeh);

  const vViolations = violations.filter(v => v.plate===veh?.plate && v.status!=="مسددة");
  const vViolAmt = vViolations.reduce((s,v) => s+(+v.amount||0), 0);

  const licStatus = exp => {
    if (!exp) return { label:"غير مدخل", color:T.sub };
    const diff = daysDiff(new Date(), exp);
    if (diff>=0) return { label:"منتهي", color:T.red };
    const r = Math.abs(diff);
    if (r<=14) return { label:`${r} يوم`, color:r<=3?T.red:T.orange };
    return { label:"ساري", color:T.green };
  };

  const lastHandover = handovers.filter(h=>h.vehicleId===selVeh).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const maintRecs = maintenanceRecs.filter(r=>r.vehicleId===selVeh).sort((a,b)=>a.oilKm-b.oilKm);
  const lastMaint = maintRecs[maintRecs.length-1];
  const fRecs = fuelRecords.filter(r=>r.vehicleId===selVeh).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const lastFuel = fRecs[0];
  const avgCost = fRecs.length ? (fRecs.reduce((s,r)=>s+(r.costPerKm||0),0)/fRecs.length).toFixed(3) : null;

  const IR = ({ label, value, color=T.text }) => (

  };

  const filterByView = v => {
    if (view==="active") return v.status!=="مسددة" && v.status!=="انتظار";
    if (view==="waiting") return v.status==="انتظار";
    if (view==="archive") return v.status==="مسددة";
    return true;
  };

  const displayed = violations.filter(v => {
    if (!filterByView(v)) return false;
    if (selVeh) { const veh=vehicles.find(x=>x.id===selVeh); if(veh && v.plate!==veh.plate) return false; }
    if (search && !v.plate.includes(search) && !v.driver.includes(search) && !(v.vnum||"").includes(search)) return false;
    if (dateFrom && v.vdate < dateFrom) return false;
    if (dateTo && v.vdate > dateTo) return false;
    return true;
  });

  const active = violations.filter(v => v.status!=="مسددة" && v.status!=="انتظار");
  const waiting = violations.filter(v => v.status==="انتظار");
  const totalAmt = active.reduce((s,v) => s+(+v.amount||0), 0);
  const savingAmt = active.filter(v=>daysLeft(v)>0).reduce((s,v) => s+(+v.amount||0)*0.3, 0);
  const weekAlert = active.filter(v => { const r=daysLeft(v); return r>0&&r<=7; }).length;

  const driverMap = {};
  violations.forEach(v => { if(v.driver) driverMap[v.driver]=(driverMap[v.driver]||0)+1; });
  const topDriver = Object.entries(driverMap).sort((a,b) => b[1]-a[1])[0];

  const vehViolCount = id => {
    const veh = vehicles.find(v => v.id===id);
    if (!veh) return 0;
    return violations.filter(v => v.plate===veh.plate && v.status!=="مسددة").length;
  };

  const addViolation = async () => {
    if (!form.plate||!form.driver||!form.vdate||!form.vtype||!form.amount) return;
    const finalType = form.vtype==="أخرى" && form.vtypeOther ? form.vtypeOther : form.vtype;
    const newV = { ...form, vtype:finalType, id:uid(), status:"مفتوحة", created:new Date().toISOString() };
    await saveViolations(newV);
    setForm({ plate:"", driver:"", vdate:todayISO(), vtype:"", vtypeOther:"", vnum:"", amount:"", note:"" });
    setShowAdd(false);
  };

  const markPaid = async id => {
    const v = violations.find(x=>x.id===id);
    await saveViolations({...v, status:"مسددة", paidDate:new Date().toISOString()});
    setDetail(null);
  };

  const sendToAccounting = async () => {
    const items = violations.filter(v => selected.includes(v.id));
    let msg = "📋 *تقرير المخالفات — الأثر الذهبي*\n\n";
    items.forEach((v,i) => { msg += `${i+1}. لوحة: ${v.plate} | السائق: ${v.driver}\n   التاريخ: ${toDateStr(v.vdate)} | النوع: ${v.vtype}\n   المبلغ: ${v.amount} د.أ | المتبقي: ${daysLeft(v)} يوم\n\n`; });
    for(const v of items){ await saveViolations({...v, status:"انتظار", sentDate:new Date().toISOString()}); }
    setSelected([]);
    sendWA(PHONE, msg);
  };

  const exportExcel = () => {
    const rows = displayed.map(v => ({
      "رقم المركبة":v.plate, "الموظف المسؤول":v.driver, "رقم المخالفة":v.vnum||"—",
      "تاريخ المخالفة":toDateStr(v.vdate), "قيمة المخالفة":v.amount, "وصف المخالفة":v.vtype,
      "الحالة":statusOf(v).label
    }));
    const ws = XLSX.utils.json_to_sheet(rows);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, "المخالفات", ws);
    XLSX.writeFile(wb, `مخالفات_${todayISO()}.xlsx`);
  };

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="🚨 المخالفات" onBack={onBack}/>

      <div style={{ padding:"14px 14px 0", display:"flex", gap:8 }}>
        <StatBox icon="📋" label="مخالفات نشطة" value={active.length} color={T.red}/>
        <StatBox icon="💰" label="إجمالي المبالغ" value={`${totalAmt.toFixed(0)} د.أ`} color={T.orange}/>
      </div>
      <div style={{ padding:"8px 14px 0", display:"flex", gap:8 }}>
        <StatBox icon="💚" label="توفير بخصم 30%" value={`${savingAmt.toFixed(0)} د.أ`} color={T.green}/>
        <StatBox icon="⏰" label="تنتهي هذا الأسبوع" value={weekAlert} color={T.yellow}/>
      </div>

      {topDriver && (
        <div style={{ margin:"10px 14px 0", background:T.card2, borderRadius:12, padding:"10px 14px", display:"flex", alignItems:"center", gap:10, border:`1px solid ${T.red}33` }}>
          <span style={{ fontSize:20 }}>⚠️</span>
          <div><span style={{ color:T.sub, ...GF, fontSize:11 }}>الأكثر مخالفةً: </span><span style={{ color:T.red, ...GF, fontWeight:700 }}>{topDriver[0]}</span><span style={{ color:T.sub, ...GF, fontSize:11 }}> ({topDriver[1]})</span></div>
        </div>
      )}

      {/* Vehicle filter */}
      <div style={{ padding:"10px 14px 0" }}>
        <select value={selVeh} onChange={e=>setSelVeh(e.target.value)}
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:selVeh?T.gold:T.sub, fontSize:13, ...GF, outline:"none" }}>
          <option value="">— جميع المركبات —</option>
          {vehicles.map(v => { const cnt=vehViolCount(v.id); return <option key={v.id} value={v.id}>{v.plate}{cnt>0?` (${cnt})`:""}</option>; })}
        </select>
      </div>

      {/* Search */}
      <div style={{ padding:"8px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث باللوحة أو السائق أو رقم المخالفة"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      {/* Date filter */}
      <div style={{ padding:"8px 14px 0", display:"flex", gap:8 }}>
        <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
          style={{ flex:1, background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"9px 12px", color:dateFrom?T.text:T.sub, fontSize:12, ...GF, boxSizing:"border-box", outline:"none" }}/>
        <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
          style={{ flex:1, background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"9px 12px", color:dateTo?T.text:T.sub, fontSize:12, ...GF, boxSizing:"border-box", outline:"none" }}/>
        {(dateFrom||dateTo) && <button onClick={()=>{ setDateFrom(""); setDateTo(""); }} style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:10, padding:"9px 12px", cursor:"pointer", ...GF, fontSize:12 }}>مسح</button>}
      </div>

      {/* View tabs */}
      <div style={{ padding:"8px 14px 0", display:"flex", gap:6 }}>
        {[{v:"active",l:"النشطة"},{v:"waiting",l:`انتظار (${waiting.length})`},{v:"archive",l:"الأرشيف"}].map(f => (
          <button key={f.v} onClick={()=>setView(f.v)}
            style={{ flex:1, background:view===f.v?T.gold:T.card, color:view===f.v?"#000":T.sub, border:"none", borderRadius:10, padding:"9px", ...GF, fontSize:12, fontWeight:700, cursor:"pointer" }}>{f.l}</button>
        ))}
      </div>

      {/* Actions bar */}
      <div style={{ padding:"8px 14px 0", display:"flex", gap:8 }}>
        {displayed.length>0 && <Btn label="📊 تصدير Excel" onClick={exportExcel} sm color={T.green} outline/>}
        {selected.length>0 && <Btn label={`📤 إرسال للمحاسبة (${selected.length})`} onClick={sendToAccounting} sm color={T.orange}/>}
      </div>

      {/* List */}
      <div style={{ padding:"10px 14px" }}>
        {displayed.map(v => {
          const s = statusOf(v), r = daysLeft(v), isSel = selected.includes(v.id);
          const al = (v.status==="مسددة"||v.status==="انتظار") ? null :
            r<=0 ? {msg:"⛔ انتهت مهلة الخصم",color:T.red} :
            r<=5 ? {msg:`🔴 تنبيه شديد — ${r} أيام`,color:T.red} :
            r<=10 ? {msg:`🟠 تنبيه متوسط — ${r} يوم`,color:T.orange} : null;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${s.color}33`, borderRight:`4px solid ${s.color}` }}>
              <div style={{ padding:"14px 14px 12px", display:"flex", gap:10 }}>
                {view==="active" && (
                  <input type="checkbox" checked={isSel} onChange={()=>setSelected(isSel?selected.filter(i=>i!==v.id):[...selected,v.id])}
                    style={{ marginTop:3, width:18, height:18, accentColor:T.gold, flexShrink:0 }}/>
                )}
                <div style={{ flex:1 }} onClick={()=>setDetail(v)}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                    <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                    <Badge label={s.label} color={s.color}/>
                  </div>
                  <div style={{ color:T.sub, ...GF, fontSize:12, marginBottom:6 }}>👤 {v.driver} | {v.vtype}</div>
                  <div style={{ display:"flex", justifyContent:"space-between" }}>
                    <span style={{ color:T.sub, ...GF, fontSize:12 }}>📅 {toDateStr(v.vdate)}</span>
                    <div><span style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700 }}>{v.amount}</span><span style={{ color:T.sub, ...GF, fontSize:12 }}> د.أ</span></div>
                  </div>
                  {v.status!=="مسددة" && r>0 && (
                    <div style={{ marginTop:10, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                      <div style={{ display:"flex", justifyContent:"space-between", marginBottom:6 }}>
                        <span style={{ color:T.sub, ...GF, fontSize:11 }}>المتبقي من مهلة الخصم</span>
                        <span style={{ color:s.color, ...GF, fontSize:13, fontWeight:700 }}>{r} يوم</span>
                      </div>
                      <div style={{ background:T.border, borderRadius:4, height:5 }}>
                        <div style={{ background:s.color, height:5, borderRadius:4, width:`${Math.max(3,(r/30)*100)}%` }}/>
                      </div>
                    </div>
                  )}
                  {al && <div style={{ marginTop:8, background:al.color+"22", borderRadius:8, padding:"5px 10px", color:al.color, ...GF, fontSize:12 }}>{al.msg}</div>}
                </div>
              </div>
            </div>
          );
        })}
        {!displayed.length && <div style={{ textAlign:"center", padding:44, color:T.sub, ...GF }}>لا توجد مخالفات</div>}
      </div>

      <div style={{ padding:"0 14px" }}>
        <Btn label="+ إضافة مخالفة" onClick={()=>setShowAdd(true)} full color={T.gold}/>
      </div>

      {/* Add Modal */}
      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="إضافة مخالفة جديدة">
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:6 }}>رقم المركبة *</label>
          <select value={form.plate} onChange={e=>setForm({...form,plate:e.target.value})}
            style={{ width:"100%", background:T.card2, border:`1px solid ${T.border}`, borderRadius:10, padding:"11px 14px", color:form.plate?T.text:T.sub, fontSize:14, ...GF, boxSizing:"border-box", outline:"none" }}>
            <option value="">— اختر المركبة —</option>
            {vehicles.map(v => <option key={v.id} value={v.plate}>{v.plate}{v.type?` — ${v.type}`:""}</option>)}
          </select>
        </div>
        <Field label="الموظف المسؤول" value={form.driver} onChange={v=>setForm({...form,driver:v})} req/>
        <Field label="تاريخ المخالفة" value={form.vdate} onChange={v=>setForm({...form,vdate:v})} type="date" req/>
        <FieldSelect label="تصنيف المخالفة" value={form.vtype} onChange={v=>setForm({...form,vtype:v})} opts={VTYPES} req/>
        {form.vtype==="أخرى" && <Field label="اكتب نوع المخالفة" value={form.vtypeOther} onChange={v=>setForm({...form,vtypeOther:v})} placeholder="اكتب وصف المخالفة..." req/>}
        <Field label="رقم المخالفة (اختياري)" value={form.vnum} onChange={v=>setForm({...form,vnum:v})}/>
        <Field label="قيمة المخالفة (د.أ)" value={form.amount} onChange={v=>setForm({...form,amount:v})} type="number" req/>
        <FieldSelect label="ملاحظات (اختياري)" value={form.note} onChange={v=>setForm({...form,note:v})} opts={noteOptions}/>
        <Btn label="✓ حفظ المخالفة" onClick={addViolation} full color={T.gold}/>
      </Modal>

      {/* Detail Modal */}
      <Modal show={!!detail} onClose={()=>setDetail(null)} title="تفاصيل المخالفة">
        {detail && (() => {
          const disc = (+detail.amount*0.7).toFixed(2), save_ = (+detail.amount*0.3).toFixed(2);
          return (
            <div>
              {[
                { icon:"📅", label:"تاريخ المخالفة", date:detail.vdate },
                detail.sentDate && { icon:"📤", label:"أُرسلت للمحاسبة", date:detail.sentDate },
                detail.paidDate && { icon:"✅", label:"تاريخ السداد", date:detail.paidDate },
              ].filter(Boolean).map((x,i) => (
                <div key={i} style={{ display:"flex", gap:12, alignItems:"center", marginBottom:12, background:T.card2, borderRadius:10, padding:"8px 12px" }}>
                  <span style={{ fontSize:20 }}>{x.icon}</span>
                  <div><div style={{ color:T.sub, ...GF, fontSize:11 }}>{x.label}</div><div style={{ color:T.text, ...GF, fontSize:14 }}>{toDateStr(x.date)}</div></div>
                </div>
              ))}
              <div style={{ background:T.card2, borderRadius:12, padding:16, margin:"16px 0" }}>
                {[["رقم اللوحة",detail.plate],["الموظف",detail.driver],["نوع المخالفة",detail.vtype],
                  ["رقم المخالفة",detail.vnum||"—"],["المبلغ الأصلي",`${detail.amount} د.أ`],
                  ["بعد خصم 30%",`${disc} د.أ`],["الوفر",`${save_} د.أ`],["الملاحظة",detail.note||"—"],
                ].map(([k,v]) => (
                  <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                    <span style={{ color:T.sub, ...GF, fontSize:13 }}>{k}</span>
                    <span style={{ color:T.text, ...GF, fontSize:13, fontWeight:600 }}>{v}</span>
                  </div>
                ))}
              </div>
              {detail.status!=="مسددة" && <Btn label="✅ تم السداد" onClick={()=>markPaid(detail.id)} full color={T.green}/>}
            </div>
          );
        })()}
      </Modal>
    </div>
  );
}

// LICENSE TAB
// ══════════════════════════════════════════════════
function LicenseTab({ vehicles, saveVehicles, saveOneVehicle, onBack }) {
  const [selVeh, setSelVeh] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [detail, setDetail] = useState(null);
  const [renewing, setRenewing] = useState(null);
  const [search, setSearch] = useState("");
  const [form, setForm] = useState({ plate:"", type:"", license_exp:"", insurance_exp:"" });
  const [rForm, setRForm] = useState({ kind:"ترخيص", date:"", amount:"" });

  const statusOf = exp => {
    if (!exp) return { label:"غير مدخل", color:T.sub };
    const diff = daysDiff(new Date(), exp);
    if (diff>=0) return { label:"منتهي", color:T.red };
    const r = Math.abs(diff);
    if (r<=3) return { label:`${r} أيام — شديد`, color:T.red };
    if (r<=7) return { label:`${r} أيام — عالي`, color:T.orange };
    if (r<=14) return { label:`${r} يوم — تنبيه`, color:T.yellow };
    return { label:"ساري", color:T.green };
  };

  const worstColor = v => {
    const order = [T.red, T.orange, T.yellow, T.green, T.sub];
    const ls = statusOf(v.license_exp), is = statusOf(v.insurance_exp);
    return order.indexOf(ls.color) < order.indexOf(is.color) ? ls.color : is.color;
  };

  const green = vehicles.filter(v => worstColor(v)===T.green).length;
  const warn = vehicles.filter(v => [T.yellow,T.orange].includes(worstColor(v))).length;
  const expd = vehicles.filter(v => worstColor(v)===T.red).length;

  const displayed = vehicles.filter(v => {
    if (selVeh && v.id!==selVeh) return false;
    if (search && !v.plate.includes(search) && !v.type?.includes(search)) return false;
    return true;
  });

  const updateField = async (vehId, field, val) => { const veh=vehicles.find(v=>v.id===vehId); await saveOneVehicle({...veh,[field]:val}); };
  const addVehicle = async () => { if (!form.plate) return; await saveOneVehicle({...form,id:uid(),regNum:"",make:"",renewHistory:[]}); setForm({plate:"",type:"",fuelType:"",license_exp:"",insurance_exp:""}); setShowAdd(false); };
  const doRenew = async () => {
    if (!rForm.kind||!rForm.date) return;
    const veh = vehicles.find(v=>v.id===renewing.id);
    const h = [...(veh.renewHistory||[]), {...rForm, addedAt:new Date().toISOString()}];
    const up = {...veh, renewHistory:h};
    if (rForm.kind==="ترخيص") up.license_exp = rForm.date; else up.insurance_exp = rForm.date;
    await saveOneVehicle(up);
    setRenewing(null); setRForm({ kind:"ترخيص", date:"", amount:"" });
  };

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="📋 الترخيص والتأمين" onBack={onBack}/>
      <div style={{ padding:"14px 14px 0", display:"flex", gap:8 }}>
        <StatBox icon="✅" label="سارية" value={green} color={T.green}/>
        <StatBox icon="⚠️" label="تحتاج انتباه" value={warn} color={T.yellow}/>
        <StatBox icon="🔴" label="منتهية" value={expd} color={T.red}/>
      </div>
      <VehicleSelector vehicles={vehicles} selected={selVeh} onChange={setSelVeh}/>
      <div style={{ padding:"10px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث برقم اللوحة أو النوع"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v => {
          const ls = statusOf(v.license_exp), is_ = statusOf(v.insurance_exp), wc = worstColor(v);
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${wc}33`, borderRight:`4px solid ${wc}` }}>
              <div style={{ padding:"14px 16px", cursor:"pointer" }} onClick={()=>setDetail(v)}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12 }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  <span style={{ color:T.sub, ...GF, fontSize:12 }}>{v.type}</span>
                </div>
                <div style={{ display:"flex", gap:8 }}>
                  <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                    <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:4 }}>الترخيص</div>
                    <div style={{ color:T.text, ...GF, fontSize:12, marginBottom:6 }}>{v.license_exp?toDateStr(v.license_exp):"غير مدخل"}</div>
                    <Badge label={ls.label} color={ls.color}/>
                  </div>
                  <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                    <div style={{ color:T.sub, ...GF, fontSize:10, marginBottom:4 }}>التأمين</div>
                    <div style={{ color:T.text, ...GF, fontSize:12, marginBottom:6 }}>{v.insurance_exp?toDateStr(v.insurance_exp):"غير مدخل"}</div>
                    <Badge label={is_.label} color={is_.color}/>
                  </div>
                </div>
              </div>
              {/* Quick insurance input if missing */}
              {!v.insurance_exp && (
                <div style={{ padding:"0 14px 14px", borderTop:`1px solid ${T.border}`, paddingTop:12 }}>
                  <div style={{ color:T.sub, ...GF, fontSize:11, marginBottom:6 }}>أدخل تاريخ انتهاء التأمين:</div>
                  <div style={{ display:"flex", gap:8 }}>
                    <input type="date" id={`ins-${v.id}`}
                      style={{ flex:1, background:T.card2, border:`1px solid ${T.gold}44`, borderRadius:8, padding:"8px 12px", color:T.text, fontSize:12, ...GF, outline:"none" }}/>
                    <button onClick={()=>{ const val=document.getElementById(`ins-${v.id}`).value; if(val) updateField(v.id,"insurance_exp",val); }}
                      style={{ background:T.gold, border:"none", color:"#000", borderRadius:8, padding:"8px 14px", cursor:"pointer", ...GF, fontWeight:700, fontSize:13 }}>حفظ</button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{ padding:"0 14px" }}>
        <Btn label="+ إضافة مركبة" onClick={()=>setShowAdd(true)} full color={T.gold}/>
      </div>

      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="إضافة مركبة جديدة">
        <Field label="رقم اللوحة" value={form.plate} onChange={v=>setForm({...form,plate:v})} req/>
        <Field label="نوع المركبة (اختياري)" value={form.type} onChange={v=>setForm({...form,type:v})}/>
        <div style={{marginBottom:14}}>
          <label style={{color:T.sub,fontSize:12,...GF,display:"block",marginBottom:6}}>نوع الوقود</label>
          <select value={form.fuelType||""} onChange={e=>setForm({...form,fuelType:e.target.value})}
            style={{width:"100%",background:T.card2,border:`1px solid ${T.border}`,borderRadius:10,padding:"11px 14px",color:T.text,fontSize:14,...GF,boxSizing:"border-box",outline:"none"}}>
            <option value="">بنزين / ديزل</option>
            <option value="electric">⚡ كهربائية</option>
            <option value="hybrid">🔋 هايبرد</option>
          </select>
        </div>
        <Field label="تاريخ انتهاء الترخيص" value={form.license_exp} onChange={v=>setForm({...form,license_exp:v})} type="date"/>
        <Field label="تاريخ انتهاء التأمين" value={form.insurance_exp} onChange={v=>setForm({...form,insurance_exp:v})} type="date"/>
        <Btn label="✓ حفظ المركبة" onClick={addVehicle} full color={T.gold}/>
      </Modal>

      <Modal show={!!detail} onClose={()=>setDetail(null)} title={detail?.plate||""}>
        {detail && (
          <div>
            <div style={{ background:T.card2, borderRadius:12, padding:16, marginBottom:16 }}>
              {[["نوع المركبة",detail.type||"—"],["انتهاء الترخيص",detail.license_exp?toDateStr(detail.license_exp):"غير مدخل"],["انتهاء التأمين",detail.insurance_exp?toDateStr(detail.insurance_exp):"غير مدخل"]].map(([k,v]) => (
                <div key={k} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                  <span style={{ color:T.sub, ...GF, fontSize:13 }}>{k}</span>
                  <span style={{ color:T.text, ...GF, fontSize:13 }}>{v}</span>
                </div>
              ))}
            </div>
            <Field label="تحديث تاريخ انتهاء التأمين" value={detail.insurance_exp||""} onChange={v=>{ updateField(detail.id,"insurance_exp",v); setDetail({...detail,insurance_exp:v}); }} type="date"/>
            <Field label="تحديث تاريخ انتهاء الترخيص" value={detail.license_exp||""} onChange={v=>{ updateField(detail.id,"license_exp",v); setDetail({...detail,license_exp:v}); }} type="date"/>
            {(detail.renewHistory||[]).length>0 && (
              <div style={{ marginBottom:16 }}>
                <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:10 }}>سجل التجديدات</p>
                {detail.renewHistory.map((r,i) => (
                  <div key={i} style={{ background:T.card2, borderRadius:10, padding:"8px 12px", marginBottom:8, display:"flex", justifyContent:"space-between" }}>
                    <span style={{ color:T.text, ...GF, fontSize:13 }}>{r.kind}</span>
                    <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(r.date)}{r.amount?` | ${r.amount} د.أ`:""}</span>
                  </div>
                ))}
              </div>
            )}
            <Btn label="🔄 تجديد" onClick={()=>{ setRenewing(detail); setDetail(null); }} full color={T.blue}/>
          </div>
        )}
      </Modal>

      <Modal show={!!renewing} onClose={()=>setRenewing(null)} title={`تجديد — ${renewing?.plate}`}>
        {renewing && (
          <div>
            <FieldSelect label="نوع التجديد" value={rForm.kind} onChange={v=>setRForm({...rForm,kind:v})} opts={["ترخيص","تأمين"]} req/>
            <Field label="تاريخ الانتهاء الجديد" value={rForm.date} onChange={v=>setRForm({...rForm,date:v})} type="date" req/>
            <Field label="المبلغ المدفوع (اختياري)" value={rForm.amount} onChange={v=>setRForm({...rForm,amount:v})} type="number"/>
            <Btn label="✓ حفظ التجديد" onClick={doRenew} full color={T.gold}/>
          </div>
        )}
      </Modal>
    </div>
  );
}

// HANDOVER TAB
// ══════════════════════════════════════════════════
function HandoverTab({ handovers, saveHandovers, vehicles, equipmentList, myPhone, onBack }) {
  const [selVeh, setSelVeh] = useState("");
  const [formVeh, setFormVeh] = useState(null);
  const [histVeh, setHistVeh] = useState(null);
  const [search, setSearch] = useState("");
  const [showSig, setShowSig] = useState(false);
  const [form, setForm] = useState({ type:"استلام", driver:"", equip:{}, photos:{f:null,b:null,r:null,l:null}, signature:null });

  const now2 = new Date();
  const vehHandovers = id => handovers.filter(h=>h.vehicleId===id).sort((a,b)=>new Date(a.date)-new Date(b.date));
  const lastH = id => { const a=vehHandovers(id); return a.length?a[a.length-1]:null; };

  const uploadPhoto = (side, e) => {
    const file = e.target.files[0]; if (!file) return;
    const rd = new FileReader();
    rd.onload = () => setForm(f => ({...f, photos:{...f.photos,[side]:rd.result}}));
    rd.readAsDataURL(file);
  };

  const submit = async () => {
    if (!form.driver||!form.type) return;
    const rec = { id:uid(), vehicleId:formVeh, type:form.type, driver:form.driver, date:new Date().toISOString(), equip:form.equip, photos:form.photos, signature:form.signature };
    await saveHandovers(rec);
    // Send WA receipt
    if (myPhone) {
      const veh = vehicles.find(v=>v.id===formVeh);
      const equippedItems = Object.entries(form.equip).filter(([,v])=>v).map(([k])=>k);
      let msg = `🔑 *سند ${form.type} — الأثر الذهبي*\n\n🚗 المركبة: ${veh?.plate}\n👤 السائق: ${form.driver}\n📅 ${now2.toLocaleDateString("ar-JO")} ${fmt12(now2)}\n`;
      if (equippedItems.length) msg += `✓ العدة: ${equippedItems.join("، ")}\n`;
      sendWA(myPhone, msg);
    }
    setForm({ type:"استلام", driver:"", equip:{}, photos:{f:null,b:null,r:null,l:null}, signature:null });
    setFormVeh(null);
  };

  const photoSides = [{k:"f",l:"أمامية"},{k:"b",l:"خلفية"},{k:"r",l:"يمين"},{k:"l",l:"يسار"}];
  const displayed = vehicles.filter(v => {
    if (selVeh && v.id!==selVeh) return false;
    if (search && !v.plate.includes(search) && !v.type?.includes(search)) return false;
    return true;
  });

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="🔑 الاستلام والتسليم" onBack={onBack}/>
      <VehicleSelector vehicles={vehicles} selected={selVeh} onChange={setSelVeh}/>
      <div style={{ padding:"10px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v => {
          const last = lastH(v.id), lc = last?.type==="استلام" ? T.blue : T.green;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${T.border}`, overflow:"hidden" }}>
              <div style={{ padding:"14px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  {last && <Badge label={last.type} color={lc}/>}
                </div>
                {v.type && <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:4 }}>{v.type}</div>}
                {last && <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:6 }}>👤 {last.driver} — {toDateStr(last.date)} {fmt12(last.date)}</div>}
              </div>
              <div style={{ display:"flex", borderTop:`1px solid ${T.border}` }}>
                <button onClick={()=>setFormVeh(v.id)} style={{ flex:1, background:"none", border:"none", color:T.gold, ...GF, fontSize:13, fontWeight:600, padding:"11px", cursor:"pointer" }}>+ إجراء جديد</button>
                <button onClick={()=>setHistVeh(v)} style={{ flex:1, background:"none", border:"none", borderRight:`1px solid ${T.border}`, color:T.sub, ...GF, fontSize:13, padding:"11px", cursor:"pointer" }}>📂 السجل</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Form Modal */}
      <Modal show={!!formVeh} onClose={()=>setFormVeh(null)} title={`إجراء — ${vehicles.find(v=>v.id===formVeh)?.plate||""}`}>
        <div style={{ background:T.card2, borderRadius:12, padding:"10px 14px", marginBottom:14, border:`1px solid ${T.gold}33` }}>
          <div style={{ color:T.sub, ...GF, fontSize:11 }}>التاريخ والوقت (تلقائي)</div>
          <div style={{ color:T.gold, ...GF, fontSize:15, fontWeight:700, marginTop:4 }}>{now2.toLocaleDateString("ar-JO")} — {fmt12(now2)}</div>
        </div>
        <FieldSelect label="الحالة" value={form.type} onChange={v=>setForm({...form,type:v})} opts={["استلام","تسليم"]} req/>
        <Field label="اسم السائق" value={form.driver} onChange={v=>setForm({...form,driver:v})} req/>

        {/* Equipment checklist */}
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:8 }}>عدة المركبة</label>
          <div style={{ background:T.card2, borderRadius:12, padding:"12px 14px" }}>
            {equipmentList.map(item => (
              <label key={item} style={{ display:"flex", alignItems:"center", gap:10, marginBottom:10, cursor:"pointer" }}>
                <input type="checkbox" checked={!!form.equip[item]} onChange={e=>setForm(f=>({...f,equip:{...f.equip,[item]:e.target.checked}}))}
                  style={{ width:18, height:18, accentColor:T.gold, flexShrink:0 }}/>
                <span style={{ color:T.text, ...GF, fontSize:14 }}>{item}</span>
              </label>
            ))}
          </div>
        </div>

        {/* Photos */}
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:8 }}>صور المركبة (اختياري)</label>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
            {photoSides.map(({k,l}) => (
              <div key={k}>
                <input type="file" accept="image/*" capture="environment" onChange={e=>uploadPhoto(k,e)} style={{ display:"none" }} id={`ph-${k}`}/>
                <label htmlFor={`ph-${k}`} style={{ display:"block", background:T.card2, borderRadius:10, border:`2px dashed ${form.photos[k]?T.gold:T.border}`, padding:"14px 8px", textAlign:"center", cursor:"pointer" }}>
                  {form.photos[k]
                    ? <img src={form.photos[k]} style={{ width:"100%", height:55, objectFit:"cover", borderRadius:8 }} alt=""/>
                    : <><div style={{ fontSize:22 }}>📷</div><div style={{ color:T.sub, ...GF, fontSize:11, marginTop:4 }}>{l}</div></>}
                </label>
              </div>
            ))}
          </div>
        </div>

        {/* Signature */}
        <div style={{ marginBottom:14 }}>
          <label style={{ color:T.sub, fontSize:12, ...GF, display:"block", marginBottom:8 }}>توقيع السائق</label>
          {form.signature
            ? <div style={{ background:T.card2, borderRadius:12, padding:8, position:"relative" }}>
                <img src={form.signature} style={{ width:"100%", borderRadius:8, maxHeight:120, objectFit:"contain" }} alt="توقيع"/>
                <button onClick={()=>setForm(f=>({...f,signature:null}))} style={{ position:"absolute", top:8, left:8, background:T.red, border:"none", color:"#fff", borderRadius:6, padding:"4px 8px", cursor:"pointer", ...GF, fontSize:11 }}>إعادة</button>
              </div>
            : <button onClick={()=>setShowSig(true)} style={{ width:"100%", background:T.card2, border:`2px dashed ${T.gold}44`, borderRadius:12, padding:"16px", color:T.sub, cursor:"pointer", ...GF, fontSize:13 }}>✍️ اضغط للتوقيع</button>
          }
        </div>

        <Btn label="✓ حفظ الإجراء وإرسال السند" onClick={submit} full color={T.gold}/>
      </Modal>

      {/* Signature Modal */}
      <Modal show={showSig} onClose={()=>setShowSig(false)} title="توقيع السائق">
        <SignaturePad onSave={sig=>{ setForm(f=>({...f,signature:sig})); setShowSig(false); }} onCancel={()=>setShowSig(false)}/>
      </Modal>

      {/* History Modal */}
      <Modal show={!!histVeh} onClose={()=>setHistVeh(null)} title={`سجل — ${histVeh?.plate}`}>
        {histVeh && (() => {
          const records = vehHandovers(histVeh.id).reverse();
          if (!records.length) return <div style={{ textAlign:"center", color:T.sub, ...GF, padding:24 }}>لا يوجد سجل بعد</div>;
          return records.map(h => {
            const hc = h.type==="استلام" ? T.blue : T.green;
            const equippedItems = Object.entries(h.equip||{}).filter(([,v])=>v).map(([k])=>k);
            const photos = Object.entries(h.photos||{}).filter(([,v])=>v);
            return (
              <div key={h.id} style={{ background:T.card2, borderRadius:14, padding:"12px 14px", marginBottom:12, borderRight:`3px solid ${hc}` }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                  <Badge label={h.type} color={hc}/>
                  <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(h.date)} {fmt12(h.date)}</span>
                </div>
                <div style={{ color:T.text, ...GF, marginTop:8, fontWeight:600 }}>👤 {h.driver}</div>
                {equippedItems.length>0 && <div style={{ color:T.sub, ...GF, fontSize:12, marginTop:6 }}>✓ {equippedItems.join("، ")}</div>}
                {h.signature && <img src={h.signature} style={{ width:"100%", maxHeight:80, objectFit:"contain", borderRadius:8, marginTop:8 }} alt="توقيع"/>}
                {photos.length>0 && (
                  <div style={{ display:"flex", gap:6, marginTop:8, flexWrap:"wrap" }}>
                    {photos.map(([s,src]) => <img key={s} src={src} style={{ width:52, height:52, objectFit:"cover", borderRadius:8 }} alt=""/>)}
                  </div>
                )}
              </div>
            );
          });
        })()}
      </Modal>
    </div>
  );
}

// MAINTENANCE TAB
// ══════════════════════════════════════════════════
function MaintenanceTab({ records, saveRecords, vehicles, fuelRecords, onBack }) {
  const [selVeh, setSelVeh] = useState("");
  const [addVeh, setAddVeh] = useState(null);
  const [histVeh, setHistVeh] = useState(null);
  const [confirmVeh, setConfirmVeh] = useState(null);
  const [search, setSearch] = useState("");
  const [form, setForm] = useState({ oilKm:"", date:todayISO(), filterOil:1, filterDiesel:1, filterAir:1, brakes:1 });

  const vehRecs = id => records.filter(r=>r.vehicleId===id).sort((a,b)=>a.oilKm-b.oilKm);

  const calcStatus = id => {
    const vr = vehRecs(id);
    const fRecs = fuelRecords.filter(r=>r.vehicleId===id).sort((a,b)=>b.currKm-a.currKm);
    const latestFuelKm = fRecs.length ? fRecs[0].currKm : null;
    if (!vr.length) return { noData:true, latestFuelKm };
    const last = vr[vr.length-1];
    const nextOil = last.nextOilKm || (last.oilKm+5000);
    const alerts = [];
    if ((last.filterOil||0) >= 2) alerts.push({ label:"فلتر الزيت" });
    if ((last.filterDiesel||0) >= 3) alerts.push({ label:"فلتر الديزل" });
    if ((last.filterAir||0) >= 3) alerts.push({ label:"فلتر الهواء" });
    if ((last.brakes||0) >= 3) alerts.push({ label:"البريكات" });
    const twoMo = new Date(); twoMo.setMonth(twoMo.getMonth()-2);
    const noService = new Date(last.date) < twoMo;
    let oilFromFuel = null;
    if (latestFuelKm) {
      const diff = nextOil - latestFuelKm;
      if (diff<=0) oilFromFuel = { msg:`عداد المحروقات تجاوز موعد الغيار بـ ${Math.abs(diff).toLocaleString()} كلم`, color:T.red };
      else if (diff<=500) oilFromFuel = { msg:`موعد غيار الزيت خلال ${diff.toLocaleString()} كلم`, color:T.orange };
    }
    return { nextOil, lastKm:last.oilKm, lastDate:last.date, filterOil:last.filterOil||1, filterDiesel:last.filterDiesel||1, filterAir:last.filterAir||1, brakes:last.brakes||1, alerts, noService, latestFuelKm, oilFromFuel };
  };

  const thisMonth = records.filter(r => {
    const d = new Date(r.date||r.addedAt), n = new Date();
    return d.getMonth()===n.getMonth() && d.getFullYear()===n.getFullYear();
  }).length;

  const sorted = [...vehicles].sort((a,b) => {
    const sa = calcStatus(a.id), sb = calcStatus(b.id);
    if (sa.noData && !sb.noData) return 1;
    if (!sa.noData && sb.noData) return -1;
    return (sa.nextOil||9999999) - (sb.nextOil||9999999);
  });

  const displayed = sorted.filter(v => {
    if (selVeh && v.id!==selVeh) return false;
    if (search && !v.plate.includes(search) && !v.type?.includes(search)) return false;
    return true;
  });

  const doAdd = async () => {
    if (!form.oilKm||!form.date) return;
    const nextOilKm = (+form.oilKm) + 5000;
    const rec = { id:uid(), vehicleId:addVeh, oilKm:+form.oilKm, nextOilKm, date:form.date,
      filterOil:+form.filterOil, filterDiesel:+form.filterDiesel, filterAir:+form.filterAir, brakes:+form.brakes };
    await saveRecords(rec);
    setForm({ oilKm:"", date:todayISO(), filterOil:1, filterDiesel:1, filterAir:1, brakes:1 });
    setAddVeh(null);
  };

  const confirmOilChange = veh => {
    const vr = vehRecs(veh.id);
    if (!vr.length) return;
    const last = vr[vr.length-1];
    const fRecs = fuelRecords.filter(r=>r.vehicleId===veh.id).sort((a,b)=>b.currKm-a.currKm);
    const currKm = fRecs.length ? fRecs[0].currKm : last.oilKm+5000;
    const newFilterOil = (last.filterOil||0)>=2 ? 1 : (last.filterOil||0)+1;
    const newFilterDiesel = (last.filterDiesel||0)>=3 ? 1 : (last.filterDiesel||0)+1;
    const newFilterAir = (last.filterAir||0)>=3 ? 1 : (last.filterAir||0)+1;
    const newBrakes = (last.brakes||0)>=3 ? 1 : (last.brakes||0)+1;
    setConfirmVeh({ veh, currKm, last, newFilterOil, newFilterDiesel, newFilterAir, newBrakes });
  };

  const applyOilChange = async data => {
    const nextOilKm = data.currKm + 5000;
    const rec = { id:uid(), vehicleId:data.veh.id, oilKm:data.currKm, nextOilKm, date:todayISO(),
      filterOil:data.newFilterOil, filterDiesel:data.newFilterDiesel, filterAir:data.newFilterAir, brakes:data.newBrakes };
    await saveRecords(rec);
    setConfirmVeh(null);
  };

  const Counter = ({ label, value, onChange, limit }) => (
    <div style={{ marginBottom:12 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card2, borderRadius:10, padding:"10px 14px" }}>
        <span style={{ color:T.text, ...GF, fontSize:13 }}>{label}</span>
        <div style={{ display:"flex", alignItems:"center", gap:12 }}>
          <span style={{ color:value>=limit?T.red:T.gold, ...GF, fontSize:13, fontWeight:700 }}>{value}/{limit}</span>
          <div style={{ display:"flex", gap:6 }}>
            <button onClick={()=>onChange(Math.max(1,value-1))} style={{ background:T.card3, border:"none", color:T.text, borderRadius:6, width:28, height:28, cursor:"pointer", fontSize:16 }}>-</button>
            <button onClick={()=>onChange(Math.min(limit,value+1))} style={{ background:T.card3, border:"none", color:T.text, borderRadius:6, width:28, height:28, cursor:"pointer", fontSize:16 }}>+</button>
          </div>
        </div>
      </div>
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="🔧 الصيانة" onBack={onBack}/>
      <div style={{ padding:"14px 14px 0" }}>
        <div style={{ background:T.card2, borderRadius:14, padding:"14px 16px", borderTop:`3px solid ${T.orange}`, display:"flex", alignItems:"center", gap:14 }}>
          <span style={{ fontSize:28 }}>🔧</span>
          <div><div style={{ color:T.sub, ...GF, fontSize:11 }}>إجراءات هذا الشهر</div><div style={{ color:T.orange, ...GF, fontSize:22, fontWeight:700 }}>{thisMonth}</div></div>
        </div>
      </div>

      <VehicleSelector vehicles={vehicles} selected={selVeh} onChange={setSelVeh}/>

      <div style={{ padding:"10px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v => {
          const s = calcStatus(v.id);
          const borderC = s.noData ? T.border : (s.alerts.length||s.noService) ? T.red : s.oilFromFuel?.color || T.green;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${borderC}33`, borderRight:`4px solid ${borderC}` }}>
              <div style={{ padding:"14px 16px" }} onClick={()=>setHistVeh(v)}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                    {s.noService && <Badge label="⚠️ راجع البيانات" color={T.red}/>}
                    {v.type && <span style={{ color:T.sub, ...GF, fontSize:11 }}>{v.type}</span>}
                  </div>
                </div>
                {s.noData
                  ? <div style={{ color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل صيانة — أضف أول غيار</div>
                  : <>
                    <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>الغيار القادم</div>
                        <div style={{ color:T.orange, ...GF, fontWeight:700, fontSize:14 }}>{s.nextOil?.toLocaleString()} كلم</div>
                      </div>
                      {s.latestFuelKm && (
                        <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                          <div style={{ color:T.sub, ...GF, fontSize:10 }}>⛽ عداد المحروقات</div>
                          <div style={{ color:T.blue, ...GF, fontWeight:700, fontSize:14 }}>{s.latestFuelKm?.toLocaleString()} كلم</div>
                        </div>
                      )}
                    </div>
                    <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                      {[{l:"فلتر الزيت",v:s.filterOil,m:2},{l:"فلتر الديزل",v:s.filterDiesel,m:3},{l:"فلتر الهواء",v:s.filterAir,m:3},{l:"البريكات",v:s.brakes,m:3}].map(f => (
                        <div key={f.l} style={{ background:f.v>=f.m?T.red+"22":T.card2, border:`1px solid ${f.v>=f.m?T.red:T.border}`, borderRadius:8, padding:"4px 10px", display:"flex", gap:6, alignItems:"center" }}>
                          <span style={{ color:f.v>=f.m?T.red:T.sub, ...GF, fontSize:11 }}>{f.l}</span>
                          <span style={{ color:f.v>=f.m?T.red:T.gold, ...GF, fontSize:11, fontWeight:700 }}>{f.v}/{f.m}</span>
                        </div>
                      ))}
                    </div>
                    {s.oilFromFuel && <div style={{ marginTop:8, background:s.oilFromFuel.color+"22", borderRadius:8, padding:"5px 10px" }}><span style={{ color:s.oilFromFuel.color, ...GF, fontSize:12 }}>⛽ {s.oilFromFuel.msg}</span></div>}
                    {s.alerts.length>0 && <div style={{ marginTop:8 }}>{s.alerts.map((a,i) => <div key={i} style={{ background:T.red+"22", borderRadius:8, padding:"5px 10px", marginBottom:4 }}><span style={{ color:T.red, ...GF, fontSize:12 }}>⚠️ مستحق — {a.label}</span></div>)}</div>}
                  </>
                }
              </div>
              <div style={{ display:"flex", borderTop:`1px solid ${T.border}` }}>
                <button onClick={()=>{ setAddVeh(v.id); }} style={{ flex:1, background:"none", border:"none", color:T.gold, ...GF, fontSize:13, fontWeight:600, padding:"11px", cursor:"pointer" }}>+ تسجيل غيار</button>
                {!s.noData && <button onClick={()=>confirmOilChange(v)} style={{ flex:1, background:"none", border:"none", borderRight:`1px solid ${T.border}`, color:T.orange, ...GF, fontSize:13, padding:"11px", cursor:"pointer" }}>✓ تأكيد الغيار</button>}
                <button onClick={()=>setHistVeh(v)} style={{ flex:1, background:"none", border:"none", borderRight:`1px solid ${T.border}`, color:T.sub, ...GF, fontSize:13, padding:"11px", cursor:"pointer" }}>📂 السجل</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Add Modal */}
      <Modal show={!!addVeh} onClose={()=>setAddVeh(null)} title={`تسجيل غيار — ${vehicles.find(v=>v.id===addVeh)?.plate||""}`}>
        <Field label="قراءة عداد غيار الزيت (كلم)" value={form.oilKm} onChange={v=>setForm({...form,oilKm:v})} type="number" req/>
        <Field label="تاريخ الإجراء" value={form.date} onChange={v=>setForm({...form,date:v})} type="date" req/>
        {form.oilKm && (
          <div style={{ background:T.card2, borderRadius:10, padding:"10px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
            <span style={{ color:T.sub, ...GF, fontSize:13 }}>الغيار القادم تلقائياً</span>
            <span style={{ color:T.orange, ...GF, fontWeight:700 }}>{(+form.oilKm+5000).toLocaleString()} كلم</span>
          </div>
        )}
        <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:12 }}>حالة الفلاتر والبريكات الحالية:</p>
        <Counter label="فلتر الزيت (يستحق عند 2)" value={form.filterOil} onChange={v=>setForm({...form,filterOil:v})} limit={2}/>
        <Counter label="فلتر الديزل (يستحق عند 3)" value={form.filterDiesel} onChange={v=>setForm({...form,filterDiesel:v})} limit={3}/>
        <Counter label="فلتر الهواء (يستحق عند 3)" value={form.filterAir} onChange={v=>setForm({...form,filterAir:v})} limit={3}/>
        <Counter label="البريكات (تستحق عند 3)" value={form.brakes} onChange={v=>setForm({...form,brakes:v})} limit={3}/>
        <Btn label="✓ حفظ غيار الزيت" onClick={doAdd} full color={T.gold}/>
      </Modal>

      {/* Confirm Modal */}
      <Modal show={!!confirmVeh} onClose={()=>setConfirmVeh(null)} title="تأكيد غيار الزيت">
        {confirmVeh && (
          <div>
            <div style={{ background:T.card2, borderRadius:12, padding:16, marginBottom:16 }}>
              <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:12 }}>إعادة ضبط العدادات تلقائياً:</p>
              {[{l:"فلتر الزيت",old:confirmVeh.last.filterOil||0,newV:confirmVeh.newFilterOil,max:2},
                {l:"فلتر الديزل",old:confirmVeh.last.filterDiesel||0,newV:confirmVeh.newFilterDiesel,max:3},
                {l:"فلتر الهواء",old:confirmVeh.last.filterAir||0,newV:confirmVeh.newFilterAir,max:3},
                {l:"البريكات",old:confirmVeh.last.brakes||0,newV:confirmVeh.newBrakes,max:3},
              ].map(f => (
                <div key={f.l} style={{ display:"flex", justifyContent:"space-between", padding:"8px 0", borderBottom:`1px solid ${T.border}` }}>
                  <span style={{ color:T.text, ...GF, fontSize:13 }}>{f.l}</span>
                  <span style={{ color:T.sub, ...GF, fontSize:13 }}>{f.old}/{f.max} → <span style={{ color:T.green }}>{f.newV}/{f.max}</span></span>
                </div>
              ))}
            </div>
            <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:14 }}>يمكنك التعديل اليدوي بعد التأكيد</p>
            <Btn label="✓ تأكيد الغيار" onClick={()=>applyOilChange(confirmVeh)} full color={T.gold}/>
          </div>
        )}
      </Modal>

      {/* History Modal */}
      <Modal show={!!histVeh} onClose={()=>setHistVeh(null)} title={`سجل صيانة — ${histVeh?.plate}`}>
        {histVeh && (() => {
          const rr = vehRecs(histVeh.id).reverse(), total = rr.length;
          if (!total) return <div style={{ textAlign:"center", color:T.sub, ...GF, padding:24 }}>لا يوجد سجل بعد</div>;
          return rr.map((r,i) => (
            <div key={r.id} style={{ background:T.card2, borderRadius:12, padding:"12px 14px", marginBottom:10 }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                <span style={{ color:T.orange, ...GF, fontWeight:700 }}>غيار زيت #{total-i}</span>
                <span style={{ color:T.sub, ...GF, fontSize:12 }}>{toDateStr(r.date)}</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ color:T.sub, ...GF, fontSize:12 }}>العداد</span>
                <span style={{ color:T.gold, ...GF, fontWeight:700 }}>{r.oilKm.toLocaleString()} كلم</span>
              </div>
              <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
                {[{l:"فلتر زيت",v:r.filterOil||0,m:2},{l:"فلتر ديزل",v:r.filterDiesel||0,m:3},{l:"فلتر هواء",v:r.filterAir||0,m:3},{l:"بريكات",v:r.brakes||0,m:3}].map(f => (
                  <span key={f.l} style={{ background:f.v>=f.m?T.red+"22":T.card3, color:f.v>=f.m?T.red:T.sub, borderRadius:6, padding:"2px 8px", ...GF, fontSize:11 }}>{f.l}: {f.v}/{f.m}</span>
                ))}
              </div>
            </div>
          ));
        })()}
      </Modal>
    </div>
  );
}

// FUEL TAB
// ══════════════════════════════════════════════════
function FuelTab({ fuelRecords, saveFuelRecords, vehicles, maintenanceRecs, onBack }) {
  const [selVeh, setSelVeh] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [search, setSearch] = useState("");
  const [form, setForm] = useState({ vehicleId:"", prevKm:"", currKm:"", amount:"" });
  const [oilAlert, setOilAlert] = useState(null);
  const [costAlert, setCostAlert] = useState(null);

  const lastFuelKm = id => {
    const recs = fuelRecords.filter(r=>r.vehicleId===id).sort((a,b)=>b.currKm-a.currKm);
    return recs.length ? recs[0].currKm : null;
  };

  const checkOil = (vehicleId, currKm) => {
    const mRecs = maintenanceRecs.filter(r=>r.vehicleId===vehicleId).sort((a,b)=>a.oilKm-b.oilKm);
    if (!mRecs.length) return null;
    const last = mRecs[mRecs.length-1];
    const nextOil = last.nextOilKm || (last.oilKm+5000);
    const diff = nextOil - currKm;
    if (diff<=0) return { msg:`⚠️ موعد غيار الزيت تجاوز ${Math.abs(diff).toLocaleString()} كلم`, color:T.red, urgent:true };
    if (diff<=500) return { msg:`🔔 موعد غيار الزيت خلال ${diff.toLocaleString()} كلم`, color:T.orange, urgent:false };
    return null;
  };

  const checkCostAnomaly = (vehicleId, newCost) => {
    const prevRecs = fuelRecords.filter(r=>r.vehicleId===vehicleId && r.costPerKm);
    if (prevRecs.length < 3) return null;
    const avg = prevRecs.reduce((s,r)=>s+(r.costPerKm||0),0) / prevRecs.length;
    const diff = ((newCost-avg)/avg) * 100;
    if (diff>=50) return { msg:`🔴 تكلفة مشبوهة — أعلى بـ ${diff.toFixed(0)}% من المعدل`, color:T.red, avg:avg.toFixed(3) };
    if (diff>=30) return { msg:`🟠 تكلفة مرتفعة — أعلى بـ ${diff.toFixed(0)}% من المعدل`, color:T.orange, avg:avg.toFixed(3) };
    return null;
  };

  const addRecord = async () => {
    if (!form.vehicleId||!form.prevKm||!form.currKm||!form.amount) return;
    const prev = +form.prevKm, curr = +form.currKm;
    if (curr<=prev) { showToast("❌ العداد الحالي يجب أن يكون أكبر من السابق", T.red); return; }
    const dist = curr - prev;
    const cost = +form.amount / dist;
    const rec = { id:uid(), vehicleId:form.vehicleId, date:new Date().toISOString(), prevKm:prev, currKm:curr, dist, amount:+form.amount, costPerKm:+cost.toFixed(3) };
    await saveFuelRecords(rec);
    const oilChk = checkOil(form.vehicleId, curr);
    if (oilChk) { const plate=vehicles.find(v=>v.id===form.vehicleId)?.plate; setOilAlert({...oilChk,plate}); }
    const costChk = checkCostAnomaly(form.vehicleId, cost);
    if (costChk) { const plate=vehicles.find(v=>v.id===form.vehicleId)?.plate; setCostAlert({...costChk,plate,cost:cost.toFixed(3)}); }
    setForm({ vehicleId:"", prevKm:"", currKm:"", amount:"" });
    setShowAdd(false);
  };

  const vehRecords = id => fuelRecords.filter(r=>r.vehicleId===id).sort((a,b)=>new Date(b.date)-new Date(a.date));
  const displayed = vehicles.filter(v => {
    if (v.fuelType === "electric") return false;
    if (selVeh && v.id!==selVeh) return false;
    if (search && !v.plate.includes(search) && !v.type?.includes(search)) return false;
    return true;
  });

  const totalSpent = fuelRecords.reduce((s,r) => s+(r.amount||0), 0);
  const thisMonth = fuelRecords.filter(r => { const d=new Date(r.date),n=new Date(); return d.getMonth()===n.getMonth()&&d.getFullYear()===n.getFullYear(); }).reduce((s,r) => s+(r.amount||0), 0);
  const allCosts = fuelRecords.filter(r => r.costPerKm);
  const avgCost = allCosts.length ? (allCosts.reduce((s,r)=>s+(r.costPerKm||0),0)/allCosts.length).toFixed(3) : 0;

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="⛽ المحروقات" onBack={onBack}/>
      <div style={{ padding:"14px 14px 0", display:"flex", gap:8 }}>
        <StatBox icon="⛽" label="إجمالي الإنفاق" value={`${totalSpent.toFixed(0)} د.أ`} color={T.blue}/>
        <StatBox icon="📅" label="هذا الشهر" value={`${thisMonth.toFixed(0)} د.أ`} color={T.gold}/>
      </div>
      <div style={{ padding:"8px 14px 0" }}>
        <div style={{ background:T.card2, borderRadius:14, padding:"12px 16px", borderTop:`3px solid ${T.green}`, display:"flex", alignItems:"center", gap:12 }}>
          <span style={{ fontSize:24 }}>📊</span>
          <div>
            <div style={{ color:T.sub, ...GF, fontSize:11 }}>متوسط تكلفة الكيلومتر</div>
            <div style={{ color:T.green, ...GF, fontSize:20, fontWeight:700 }}>{avgCost} د.أ/كلم</div>
          </div>
        </div>
      </div>

      <VehicleSelector vehicles={vehicles} selected={selVeh} onChange={setSelVeh}/>

      <div style={{ padding:"10px 14px 0" }}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 بحث"
          style={{ width:"100%", background:T.card, border:`1px solid ${T.border}`, borderRadius:10, padding:"10px 14px", color:T.text, fontSize:13, ...GF, boxSizing:"border-box", outline:"none" }}/>
      </div>

      <div style={{ padding:"12px 14px" }}>
        {displayed.map(v => {
          const recs = vehRecords(v.id);
          const last = recs[0];
          const oilChk = last ? checkOil(v.id, last.currKm) : null;
          const vAvg = recs.filter(r=>r.costPerKm).length>=3 ? (recs.reduce((s,r)=>s+(r.costPerKm||0),0)/recs.length).toFixed(3) : null;
          return (
            <div key={v.id} style={{ background:T.card, borderRadius:16, marginBottom:12, border:`1px solid ${T.border}`, borderRight:`4px solid ${T.blue}` }}>
              <div style={{ padding:"14px 16px" }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:8 }}>
                  <span style={{ color:T.text, ...GF, fontWeight:700, fontSize:16 }}>{v.plate}</span>
                  {v.type && <span style={{ color:T.sub, ...GF, fontSize:12 }}>{v.type}</span>}
                </div>
                {last ? (
                  <>
                    <div style={{ display:"flex", gap:8, marginBottom:8 }}>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>آخر تعبئة</div>
                        <div style={{ color:T.text, ...GF, fontSize:13, fontWeight:600 }}>{toDateStr(last.date)}</div>
                      </div>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>العداد</div>
                        <div style={{ color:T.gold, ...GF, fontSize:13, fontWeight:700 }}>{last.currKm.toLocaleString()} كلم</div>
                      </div>
                    </div>
                    <div style={{ display:"flex", gap:8 }}>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>المسافة</div>
                        <div style={{ color:T.text, ...GF, fontSize:13 }}>{last.dist.toLocaleString()} كلم</div>
                      </div>
                      <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                        <div style={{ color:T.sub, ...GF, fontSize:10 }}>تكلفة الكلم</div>
                        <div style={{ color:T.green, ...GF, fontSize:13, fontWeight:600 }}>{last.costPerKm} د.أ</div>
                      </div>
                      {vAvg && (
                        <div style={{ flex:1, background:T.card2, borderRadius:10, padding:"8px 10px" }}>
                          <div style={{ color:T.sub, ...GF, fontSize:10 }}>المتوسط</div>
                          <div style={{ color:T.sub, ...GF, fontSize:13 }}>{vAvg} د.أ</div>
                        </div>
                      )}
                    </div>
                    {oilChk && <div style={{ marginTop:8, background:oilChk.color+"22", borderRadius:8, padding:"6px 10px", color:oilChk.color, ...GF, fontSize:12 }}>{oilChk.msg}</div>}
                  </>
                ) : <div style={{ color:T.sub, ...GF, fontSize:12 }}>لا يوجد سجل تعبئة بعد</div>}
              </div>
              <div style={{ borderTop:`1px solid ${T.border}` }}>
                <button onClick={()=>{ const lk=lastFuelKm(v.id); setForm({vehicleId:v.id,prevKm:lk||"",currKm:"",amount:""}); setShowAdd(true); }}
                  style={{ width:"100%", background:"none", border:"none", color:T.gold, ...GF, fontSize:13, fontWeight:600, padding:"11px", cursor:"pointer" }}>+ تسجيل تعبئة</button>
              </div>
            </div>
          );
        })}
      </div>

      {/* Add Modal */}
      <Modal show={showAdd} onClose={()=>setShowAdd(false)} title="تسجيل تعبئة وقود">
        <div style={{ background:T.card2, borderRadius:12, padding:"10px 14px", marginBottom:14, border:`1px solid ${T.gold}33` }}>
          <div style={{ color:T.sub, ...GF, fontSize:11 }}>التاريخ (تلقائي)</div>
          <div style={{ color:T.gold, ...GF, fontSize:14, fontWeight:700, marginTop:4 }}>{new Date().toLocaleDateString("ar-JO")} — {fmt12(new Date())}</div>
        </div>
        <FieldSelect label="رقم المركبة" value={form.vehicleId} onChange={v=>{ const lk=lastFuelKm(v); setForm(f=>({...f,vehicleId:v,prevKm:lk||""})); }} opts={vehicles.map(v=>({v:v.id,l:v.plate}))} req/>
        <Field label="العداد السابق (كلم)" value={form.prevKm} onChange={v=>setForm(f=>({...f,prevKm:v}))} type="number" req/>
        <Field label="العداد الحالي (كلم)" value={form.currKm} onChange={v=>setForm(f=>({...f,currKm:v}))} type="number" req/>
        {form.prevKm && form.currKm && +form.currKm>+form.prevKm && (
          <div style={{ background:T.card2, borderRadius:10, padding:"10px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
            <span style={{ color:T.sub, ...GF, fontSize:13 }}>المسافة المحسوبة</span>
            <span style={{ color:T.green, ...GF, fontSize:15, fontWeight:700 }}>{(+form.currKm-+form.prevKm).toLocaleString()} كلم</span>
          </div>
        )}
        <Field label="قيمة التعبئة (د.أ) — مثال: 45.500" value={form.amount} onChange={v=>setForm(f=>({...f,amount:v}))} type="number" req/>
        {form.amount && form.prevKm && form.currKm && +form.currKm>+form.prevKm && (
          <div style={{ background:T.card2, borderRadius:10, padding:"10px 14px", marginBottom:14, display:"flex", justifyContent:"space-between" }}>
            <span style={{ color:T.sub, ...GF, fontSize:13 }}>تكلفة الكيلومتر</span>
            <span style={{ color:T.green, ...GF, fontSize:15, fontWeight:700 }}>{(+form.amount/(+form.currKm-+form.prevKm)).toFixed(3)} د.أ/كلم</span>
          </div>
        )}
        <Btn label="✓ حفظ التعبئة" onClick={addRecord} full color={T.gold}/>
      </Modal>

      {/* Oil Alert */}
      <Modal show={!!oilAlert} onClose={()=>setOilAlert(null)} title="تنبيه غيار الزيت 🔧">
        {oilAlert && (
          <div style={{ textAlign:"center", padding:"10px 0" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>{oilAlert.urgent?"🔴":"🟠"}</div>
            <div style={{ color:oilAlert.color, ...GF, fontSize:17, fontWeight:700, marginBottom:8 }}>{oilAlert.plate}</div>
            <div style={{ color:T.text, ...GF, fontSize:15, marginBottom:24 }}>{oilAlert.msg}</div>
            <Btn label="حسناً، سأتخذ إجراءً" onClick={()=>setOilAlert(null)} full color={oilAlert.color}/>
          </div>
        )}
      </Modal>

      {/* Cost Alert */}
      <Modal show={!!costAlert} onClose={()=>setCostAlert(null)} title="تنبيه تكلفة المحروقات ⚠️">
        {costAlert && (
          <div style={{ textAlign:"center", padding:"10px 0" }}>
            <div style={{ fontSize:48, marginBottom:12 }}>🔍</div>
            <div style={{ color:costAlert.color, ...GF, fontSize:17, fontWeight:700, marginBottom:8 }}>{costAlert.plate}</div>
            <div style={{ color:T.text, ...GF, fontSize:15, marginBottom:12 }}>{costAlert.msg}</div>
            <div style={{ background:T.card2, borderRadius:12, padding:16, marginBottom:24 }}>
              <div style={{ display:"flex", justifyContent:"space-between", marginBottom:8 }}>
                <span style={{ color:T.sub, ...GF, fontSize:13 }}>التكلفة الحالية</span>
                <span style={{ color:costAlert.color, ...GF, fontWeight:700 }}>{costAlert.cost} د.أ/كلم</span>
              </div>
              <div style={{ display:"flex", justifyContent:"space-between" }}>
                <span style={{ color:T.sub, ...GF, fontSize:13 }}>المتوسط الطبيعي</span>
                <span style={{ color:T.green, ...GF, fontWeight:700 }}>{costAlert.avg} د.أ/كلم</span>
              </div>
            </div>
            <Btn label="راجعت وأؤكد" onClick={()=>setCostAlert(null)} full color={costAlert.color}/>
          </div>
        )}
      </Modal>
    </div>
  );
}
