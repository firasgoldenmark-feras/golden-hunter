// SETTINGS TAB
// ══════════════════════════════════════════════════
function SettingsTab({ noteOptions, saveNoteOptions, equipmentList, saveEquipment, savedPw, setSavedPw, vehicles, saveVehicles, saveOneVehicle, deleteVehicle, myPhone, setMyPhone, onLogout, onBack }) {
  const [open, setOpen] = useState(null);
  const [newNote, setNewNote] = useState("");
  const [newEq, setNewEq] = useState("");
  const [newPw, setNewPw] = useState("");
  const [cfmPw, setCfmPw] = useState("");
  const [pwMsg, setPwMsg] = useState("");
  const [phoneInput, setPhoneInput] = useState(myPhone||"");
  const [phoneSaved, setPhoneSaved] = useState(false);

  const changePw = () => {
    if (!newPw) return;
    if (newPw!==cfmPw) { setPwMsg("كلمتا المرور غير متطابقتين ❌"); return; }
    setSavedPw(newPw); setNewPw(""); setCfmPw("");
    setPwMsg("✅ تم تغيير كلمة المرور وحفظها");
  };

  const Section = ({ id, title, children }) => (
    <div style={{ background:T.card, borderRadius:14, marginBottom:12, overflow:"hidden" }}>
      <button onClick={()=>setOpen(open===id?null:id)} style={{ width:"100%", background:"none", border:"none", padding:"16px 18px", display:"flex", justifyContent:"space-between", alignItems:"center", cursor:"pointer" }}>
        <span style={{ color:T.text, ...GF, fontSize:15 }}>{title}</span>
        <span style={{ color:T.sub, fontSize:14 }}>{open===id?"▲":"▼"}</span>
      </button>
      {open===id && <div style={{ padding:"0 18px 18px", borderTop:`1px solid ${T.border}` }}><div style={{ marginTop:14 }}>{children}</div></div>}
    </div>
  );

  return (
    <div style={{ minHeight:"100vh", background:T.bg, direction:"rtl", paddingBottom:40 }}>
      <Header title="⚙️ الإعدادات" onBack={onBack}/>
      <div style={{ padding:16 }}>

        <Section id="pw" title="🔐 تغيير كلمة المرور">
          <Field label="كلمة المرور الجديدة" value={newPw} onChange={setNewPw} type="password"/>
          <Field label="تأكيد كلمة المرور" value={cfmPw} onChange={setCfmPw} type="password"/>
          {pwMsg && <p style={{ color:pwMsg.includes("✅")?T.green:T.red, ...GF, fontSize:13, marginBottom:12 }}>{pwMsg}</p>}
          <Btn label="حفظ كلمة المرور" onClick={changePw} full color={T.gold}/>
        </Section>

        <Section id="phone" title="📱 رقم الهاتف الشخصي للتنبيهات">
          <p style={{ color:T.sub, ...GF, fontSize:12, marginBottom:12 }}>رقمك الشخصي لاستقبال تنبيهات الأولوية القصوى عبر واتساب</p>
          <Field label="رقم الهاتف (مثال: 00962791234567)" value={phoneInput} onChange={setPhoneInput} placeholder="00962xxxxxxxxx"/>
          <Btn label="✓ حفظ الرقم" onClick={()=>{ setMyPhone(phoneInput); setPhoneSaved(true); setTimeout(()=>setPhoneSaved(false),2000); }} full color={T.gold}/>
          {phoneSaved && <p style={{ color:T.green, ...GF, fontSize:12, marginTop:8, textAlign:"center" }}>✅ تم حفظ الرقم</p>}
          {myPhone && !phoneSaved && <p style={{ color:T.sub, ...GF, fontSize:12, marginTop:8, textAlign:"center" }}>الرقم الحالي: {myPhone}</p>}
        </Section>

        <Section id="vehicles" title="🚗 إدارة المركبات واستيراد البيانات">
          <VehicleImporter vehicles={vehicles} saveVehicles={saveVehicles} saveOneVehicle={saveOneVehicle} deleteVehicle={deleteVehicle}/>
        </Section>

        <Section id="notes" title={`📝 ملاحظات المخالفات (${noteOptions.length})`}>
          {noteOptions.map((n,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card2, borderRadius:8, padding:"10px 12px", marginBottom:8 }}>
              <span style={{ color:T.text, ...GF, fontSize:13 }}>{n}</span>
              <button onClick={()=>saveNoteOptions(noteOptions.filter((_,j)=>j!==i))} style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:6, padding:"4px 10px", cursor:"pointer", ...GF, fontSize:12 }}>حذف</button>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <input value={newNote} onChange={e=>setNewNote(e.target.value)} placeholder="ملاحظة جديدة"
              style={{ flex:1, background:T.card2, border:`1px solid ${T.border}`, borderRadius:8, padding:"9px 12px", color:T.text, ...GF, fontSize:13, outline:"none" }}/>
            <button onClick={()=>{ if(newNote){ saveNoteOptions([...noteOptions,newNote]); setNewNote(""); } }}
              style={{ background:T.gold, border:"none", color:"#000", borderRadius:8, padding:"9px 18px", cursor:"pointer", ...GF, fontWeight:700, fontSize:16 }}>+</button>
          </div>
        </Section>

        <Section id="equip" title={`🔩 عدة المركبة (${equipmentList.length})`}>
          {equipmentList.map((e,i) => (
            <div key={i} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", background:T.card2, borderRadius:8, padding:"10px 12px", marginBottom:8 }}>
              <span style={{ color:T.text, ...GF, fontSize:13 }}>{e}</span>
              <button onClick={()=>saveEquipment(equipmentList.filter((_,j)=>j!==i))} style={{ background:T.red+"22", border:"none", color:T.red, borderRadius:6, padding:"4px 10px", cursor:"pointer", ...GF, fontSize:12 }}>حذف</button>
            </div>
          ))}
          <div style={{ display:"flex", gap:8, marginTop:10 }}>
            <input value={newEq} onChange={e=>setNewEq(e.target.value)} placeholder="عنصر جديد"
              style={{ flex:1, background:T.card2, border:`1px solid ${T.border}`, borderRadius:8, padding:"9px 12px", color:T.text, ...GF, fontSize:13, outline:"none" }}/>
            <button onClick={()=>{ if(newEq){ saveEquipment([...equipmentList,newEq]); setNewEq(""); } }}
              style={{ background:T.gold, border:"none", color:"#000", borderRadius:8, padding:"9px 18px", cursor:"pointer", ...GF, fontWeight:700, fontSize:16 }}>+</button>
          </div>
        </Section>

        <button onClick={onLogout}
          style={{ width:"100%", background:T.red+"22", border:`1px solid ${T.red}44`, borderRadius:14, padding:"14px", color:T.red, ...GF, fontSize:15, fontWeight:700, cursor:"pointer", marginTop:8 }}>
          🚪 تسجيل الخروج
        </button>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════
// ROOT APP
// ══════════════════════════════════════════════════
function App() {
  const [screen,setScreen]=useState("loading");
  const [savedPw,setSavedPw]=useState("1234");
  const [myPhone,setMyPhone]=useState("");
  const [vehicles,setVehicles]=useState([]);
  const [violations,setViolations]=useState([]);
  const [handovers,setHandovers]=useState([]);
  const [maintenanceRecs,setMaintenanceRecs]=useState([]);
  const [fuelRecords,setFuelRecords]=useState([]);
  const [noteOptions,setNoteOptions]=useState(DEFAULT_NOTES);
  const [equipmentList,setEquipmentList]=useState(DEFAULT_EQUIP);

  const loadAll=useCallback(async()=>{
    try{
      const [vehs,viols,hands,maints,fuels,pw,phone,notes,equip]=await Promise.all([
        DB.getVehicles(),DB.getViolations(),DB.getHandovers(),DB.getMaintenance(),DB.getFuel(),
        DB.getSetting("password","1234"),DB.getSetting("my_phone",""),
        DB.getSetting("note_options",""),DB.getSetting("equip_list",""),
      ]);
      setVehicles(vehs);setViolations(viols);setHandovers(hands);setMaintenanceRecs(maints);setFuelRecords(fuels);
      setSavedPw(pw||"1234");setMyPhone(phone||"");
      if(notes){try{setNoteOptions(JSON.parse(notes));}catch{}}
      if(equip){try{setEquipmentList(JSON.parse(equip));}catch{}}
      const loggedIn=localStorage.getItem("gm_fleet_v2")==="1";
      setScreen(loggedIn?"main":"login");
    }catch(e){console.error("Load error:",e);setScreen("login");}
  },[]);

  useEffect(()=>{loadAll();},[loadAll]);

  const nav=s=>setScreen(s);
  const back=()=>setScreen("main");
  const login=()=>{localStorage.setItem("gm_fleet_v2","1");setScreen("main");};
  const logout=()=>{localStorage.removeItem("gm_fleet_v2");setScreen("login");};
  const refresh=()=>loadAll();

  // Supabase save wrappers — تحديث الحالة محلياً فوراً بدون إعادة تحميل كاملة
  const saveViolation=async v=>{
    await DB.saveViolation(v);
    setViolations(prev=>{const idx=prev.findIndex(x=>x.id===v.id);return idx>=0?prev.map(x=>x.id===v.id?v:x):[...prev,v];});
  };
  const saveHandover=async h=>{
    await DB.saveHandover(h);
    setHandovers(prev=>{const idx=prev.findIndex(x=>x.id===h.id);return idx>=0?prev.map(x=>x.id===h.id?h:x):[h,...prev];});
  };
  const saveMaintenance=async m=>{
    await DB.saveMaintenance(m);
    setMaintenanceRecs(prev=>{const idx=prev.findIndex(x=>x.id===m.id);return idx>=0?prev.map(x=>x.id===m.id?m:x):[...prev,m];});
  };
  const saveFuel=async f=>{
    await DB.saveFuel(f);
    setFuelRecords(prev=>{const idx=prev.findIndex(x=>x.id===f.id);return idx>=0?prev.map(x=>x.id===f.id?f:x):[f,...prev];});
  };
  const saveVehicles=async vs=>{
    for(const v of vs)await DB.saveVehicle(v);
    setVehicles(vs);
  };
  const saveOneVehicle=async v=>{
    await DB.saveVehicle(v);
    setVehicles(prev=>{const idx=prev.findIndex(x=>x.id===v.id);return idx>=0?prev.map(x=>x.id===v.id?v:x):[...prev,v];});
  };
  const deleteVehicle=async id=>{
    await DB.deleteVehicle(id);
    setVehicles(prev=>prev.filter(v=>v.id!==id));
  };
  const saveNoteOptions=async opts=>{await DB.setSetting("note_options",JSON.stringify(opts));setNoteOptions(opts);};
  const saveEquipment=async opts=>{await DB.setSetting("equip_list",JSON.stringify(opts));setEquipmentList(opts);};
  const savePw=async p=>{await DB.setSetting("password",p);setSavedPw(p);};
  const savePhone=async p=>{await DB.setSetting("my_phone",p);setMyPhone(p);};

  const notifications=buildNotifications(violations,vehicles,maintenanceRecs,fuelRecords);

  if(screen==="loading")return <div style={{minHeight:"100vh",background:T.bg,display:"flex",alignItems:"center",justifyContent:"center",direction:"rtl"}}><div style={{textAlign:"center"}}><div style={{fontSize:44,marginBottom:12}}>🚗</div><div style={{color:T.gold,...GF,fontSize:16}}>جارٍ التحميل...</div></div></div>;
  if(screen==="login")return <LoginScreen savedPw={savedPw} onLogin={login}/>;
  if(screen==="main")return <MainScreen onNav={nav} notifications={notifications} myPhone={myPhone}/>;
  if(screen==="myvehicles")return <MyVehiclesTab vehicles={vehicles} violations={violations} maintenanceRecs={maintenanceRecs} fuelRecords={fuelRecords} handovers={handovers} onBack={back}/>;
  if(screen==="violations")return <ViolationsTab violations={violations} saveViolations={saveViolation} vehicles={vehicles} noteOptions={noteOptions} onBack={back}/>;
  if(screen==="license")return <LicenseTab vehicles={vehicles} saveVehicles={saveVehicles} saveOneVehicle={saveOneVehicle} onBack={back}/>;
  if(screen==="handover")return <HandoverTab handovers={handovers} saveHandovers={saveHandover} vehicles={vehicles} equipmentList={equipmentList} myPhone={myPhone} onBack={back}/>;
  if(screen==="maintenance")return <MaintenanceTab records={maintenanceRecs} saveRecords={saveMaintenance} vehicles={vehicles} fuelRecords={fuelRecords} onBack={back}/>;
  if(screen==="fuel")return <FuelTab fuelRecords={fuelRecords} saveFuelRecords={saveFuel} vehicles={vehicles} maintenanceRecs={maintenanceRecs} onBack={back}/>;
  if(screen==="settings")return <SettingsTab noteOptions={noteOptions} saveNoteOptions={saveNoteOptions} equipmentList={equipmentList} saveEquipment={saveEquipment} savedPw={savedPw} setSavedPw={savePw} vehicles={vehicles} saveVehicles={saveVehicles} saveOneVehicle={saveOneVehicle} deleteVehicle={deleteVehicle} myPhone={myPhone} setMyPhone={savePhone} onLogout={logout} onBack={back}/>;
  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/fleet/sw.js").catch(()=>{});
}

</script>
</body>
</html>
